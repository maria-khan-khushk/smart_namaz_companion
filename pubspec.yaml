name: smart_namaz_companion
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.8

dependencies:
  flutter:
    sdk: flutter

  # UI & Icons
  cupertino_icons: ^1.0.8
  flutter_svg: ^2.0.9

  # Location & Permissions
  geolocator: ^10.1.0

  # Networking
  http: ^1.1.0

  # Local Storage
  shared_preferences: ^2.2.2

  # Notifications & Audio
  flutter_local_notifications: ^16.3.0
  audioplayers: ^5.2.1

  # Qibla Compass (corrected package name)
  flutter_compass: ^0.8.1

  # Date/Time formatting
  intl: ^0.18.1

  # State Management
  provider: ^6.0.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  # Assets folder (you'll add images/sounds later)
  # assets:
  #   - assets/azan_sounds/
