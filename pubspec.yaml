name: smart_namaz_companion
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.8

dependencies:
  hijri_date: ^1.0.1   # Islamic calendar package
  table_calendar: ^3.0.9
  flutter:
    sdk: flutter
  path_provider: ^2.1.0
  # UI & Icons
  cupertino_icons: ^1.0.8
  flutter_svg: ^2.0.9

  # Location & Permissions
  geolocator: ^10.1.0

  timezone: ^0.9.4                        # timezone handling ke liye

  http: ^1.1.0

  

  # Local Storage
  shared_preferences: ^2.2.2

  # Notifications & Audio
  flutter_local_notifications: ^17.2.1
  audioplayers: ^5.2.1

  # Qibla Compass (corrected package name)
  flutter_compass: ^0.8.1

  # Date/Time formatting
  intl: ^0.18.1

  # State Management
  provider: ^6.0.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  # Assets folder (you'll add images/sounds later)
  assets:
    - assets/sounds/azan.mp3
    - assets/hadiths.json